<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>みんなのふりかえりサイト</title>
    <style>
        :root { --low-color: #9b59b6; --high-color: #3498db; --bg: #f0f4f8; }
        body { font-family: "Hiragino Sans", "Meiryo", sans-serif; background-color: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { max-width: 700px; width: 100%; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        
        /* ヘッダー・モード切替 */
        .header { background: var(--low-color); color: white; padding: 15px 10px; text-align: center; transition: 0.3s; }
        .header.high-mode { background: var(--high-color); }
        .header h1 { margin: 0; font-size: 1.3rem; }
        .mode-switcher { margin-top: 15px; display: flex; justify-content: center; gap: 10px; }
        .mode-btn { background: rgba(255,255,255,0.2); border: 2px solid white; color: white; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-size: 1rem; min-width: 120px; }
        .mode-btn.active { background: white; color: var(--low-color); font-weight: bold; }
        .header.high-mode .mode-btn.active { color: var(--high-color); }

        /* コンテンツエリア */
        .content { padding: 20px; }
        .step-title { font-size: 1.15rem; font-weight: bold; color: #444; margin-bottom: 12px; display: flex; align-items: center; }
        .step-num { background: #eee; border-radius: 50%; width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; margin-right: 10px; font-size: 1rem; }

        /* ボタンデザイン */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .subject-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .cat-btn { padding: 12px 10px; border: 2px solid #ddd; border-radius: 12px; background: white; cursor: pointer; transition: 0.2s; font-weight: bold; flex: 1; text-align: center; min-width: 70px; font-size: 1rem; min-height: 48px; }
        .cat-btn:hover { border-color: var(--low-color); background: #fdf0ff; }
        
        .cat-btn.selected { background: var(--low-color); color: white; border-color: var(--low-color); }
        .header.high-mode ~ .content .cat-btn:hover { border-color: var(--high-color); background: #f0f8ff; }
        .header.high-mode ~ .content .cat-btn.selected { background: var(--high-color); color: white; border-color: var(--high-color); }

        .template-area { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; }
        .template-btn { background: #f8f9fa; border: 1px solid #ccc; padding: 12px 15px; border-radius: 10px; font-size: 1rem; cursor: pointer; min-height: 44px; flex-grow: 1; text-align: center; }

        /* 入力エリア */
        .input-section { background: #f9f9f9; padding: 15px; border-radius: 15px; border: 2px solid #eee; margin-bottom: 20px; }
        textarea { width: 100%; min-height: 120px; border: none; background: transparent; font-size: 1.2rem; outline: none; resize: vertical; line-height: 1.5; }
        .controls { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .main-btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 1.1rem; min-width: 150px; transition: 0.3s; }
        .voice-btn { background: #ff7675; }
        .add-btn { background: var(--low-color); }
        .header.high-mode ~ .content .add-btn { background: var(--high-color); }

        /* マイク録音中のアニメーション */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }
        .voice-btn.recording { background-color: #e74c3c !important; animation: pulse 1.5s infinite; }

        /* プレビュー・アドバイス */
        .preview-card { background: #fffde7; border-left: 6px solid #f1c40f; padding: 20px; border-radius: 12px; white-space: pre-wrap; font-size: 1.1rem; line-height: 1.6; }
        
        #balance-box { margin-top: 15px; font-size: 1rem; background: #f8f9fa; padding: 15px; border-radius: 12px; text-align: center; border: 2px dashed #ddd; }
        .bal-item { display: inline-block; margin: 0 10px; font-weight: bold; }

        .advice-bubble { display: flex; align-items: flex-start; gap: 15px; margin-top: 20px; background: #e8f5e9; padding: 15px; border-radius: 15px; font-size: 1.05rem; color: #2e7d32; line-height: 1.4; }
        .char-icon { font-size: 2rem; }

        .finish-btn { width: 100%; margin-top: 25px; background: #27ae60; padding: 18px; font-size: 1.2rem; }

        /* 履歴 */
        .history { margin-top: 40px; border-top: 2px solid #eee; padding-top: 25px; }
        .history-item { font-size: 0.95rem; color: #555; background: #f1f1f1; padding: 12px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; line-height: 1.4; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header" id="header">
        <h1 id="title">きょうのがくしゅうのふりかえり</h1>
        <div class="mode-switcher">
            <button class="mode-btn active" onclick="setMode('low')">低学年(ていがくねん)</button>
            <button class="mode-btn" onclick="setMode('high')">高学年</button>
        </div>
    </div>

    <div class="content">
        <div class="step-title"><span class="step-num">0</span> <span id="label-step0">教科（きょうか）をえらぼう</span></div>
        <div class="subject-grid" id="subject-grid">
            <button class="cat-btn" onclick="selectSubject(this, '国語')">国語</button>
            <button class="cat-btn" onclick="selectSubject(this, '算数')">算数</button>
            <button class="cat-btn" onclick="selectSubject(this, '理科')">理科</button>
            <button class="cat-btn" onclick="selectSubject(this, '社会')">社会</button>
            <button class="cat-btn" onclick="selectSubject(this, 'その他')">その他</button>
        </div>

        <div class="step-title"><span class="step-num">1</span> <span id="label-step1">視点（してん）をえらぼう</span></div>
        <div class="btn-grid">
            <button class="cat-btn" onclick="renderTemplates('A')">A <span id="cat-a">わかる</span></button>
            <button class="cat-btn" onclick="renderTemplates('B')">B <span id="cat-b">できる</span></button>
            <button class="cat-btn" onclick="renderTemplates('C')">C <span id="cat-c">かかわる</span></button>
        </div>
        <div id="template-list" class="template-area"></div>

        <div class="step-title"><span class="step-num">2</span> <span id="label-step2">文章（ぶんしょう）をつくる</span></div>
        <div class="input-section">
            <textarea id="editor" placeholder="えらんだ文章がここにでるよ。"></textarea>
            <div class="controls">
                <button id="voice-btn" class="main-btn voice-btn" onclick="toggleVoice()">🎤 こえで入力</button>
                <button class="main-btn add-btn" onclick="appendDraft()">つぎの文章へ</button>
            </div>
        </div>

        <div class="preview-card" id="preview">【ここに文章がつながります】</div>
        
        <div id="balance-box">
            <div style="margin-bottom: 8px; font-weight: bold; color: #555;">振り返りバランス</div>
            <span class="bal-item">🧠 わかる：<span id="bal-A">0</span></span>
            <span class="bal-item">🛠 できる：<span id="bal-B">0</span></span>
            <span class="bal-item">💬 かかわる：<span id="bal-C">0</span></span>
        </div>

        <div class="advice-bubble" id="advice-area" style="display: none;">
            <div class="char-icon">👾</div>
            <div id="advice-text"></div>
        </div>

        <button class="main-btn finish-btn" onclick="finalize()">✅ 完了！コピーする</button>

        <div class="history" id="history-box">
            <strong>⌛ まえのふりかえり</strong>
            <div id="history-list"></div>
        </div>
    </div>
</div>

<script>
    const data = {
        low: {
            title: "きょうのがくしゅうのふりかえり",
            cats: ["わかる", "できる", "かかわる"],
            steps: ["教科（きょうか）をえらぼう", "視点（してん）をえらぼう", "文章（ぶんしょう）をつくる"],
            templates: {
                A: [
                    {t:"理由までわかった", s:"○○は、○○だから○○だとわかりました。"},
                    {t:"ちがいに気づいた", s:"○○と○○は、○○がちがうとわかりました。"},
                    {t:"あたらしく知った", s:"○○ということをはじめて知りました。"},
                    {t:"いみがわかった", s:"○○のいみがわかりました。"},
                    {t:"なるほどと思った", s:"○○を見て、なるほどと思いました。"}
                ],
                B: [
                    {t:"じぶんでできた", s:"○○をじぶんでできました。"},
                    {t:"前よりできた", s:"まえより○○ができるようになりました。"},
                    {t:"くふうしてできた", s:"○○をくふうしてできました。"},
                    {t:"まちがえずできた", s:"○○をまちがえずにできました。"},
                    {t:"つかってできた", s:"○○をつかってできました。"}
                ],
                C: [
                    {t:"友だちから学んだ", s:"○○さんのかんがえをきいて、○○がわかりました。"},
                    {t:"せつめいできた", s:"○○をみんなにせつめいできました。"},
                    {t:"きいて気づいた", s:"友だちの話をきいて、○○に気づきました。"},
                    {t:"いっしょに考えた", s:"みんなで○○について考えました。"},
                    {t:"ちがいを見つけた", s:"友だちと自分の考えのちがいを見つけました。"}
                ]
            }
        },
        high: {
            title: "今日の学習の振り返り",
            cats: ["わかる（知識）", "できる（技能）", "かかわる（思考）"],
            steps: ["教科を選ぶ", "振り返りの視点を選ぶ", "自分の言葉でまとめる"],
            templates: {
                A: [
                    {t:"理由まで理解した", s:"○○は、○○という理由で○○になることがわかりました。"},
                    {t:"関係に気づいた", s:"○○と○○には、○○という関係があるとわかりました。"},
                    {t:"比べて理解した", s:"○○と○○を比べると、○○が違うとわかりました。"},
                    {t:"仕組みがわかった", s:"○○の仕組みを理解することができました。"},
                    {t:"新しい発見", s:"○○について、新しい発見がありました。"}
                ],
                B: [
                    {t:"方法を使えた", s:"○○という方法を使って、正しく解くことができました。"},
                    {t:"前より成長", s:"前よりも○○が速く正確にできるようになりました。"},
                    {t:"工夫してできた", s:"○○を工夫することで、うまくできました。"},
                    {t:"自信がついた", s:"○○を自信を持ってできるようになりました。"},
                    {t:"意識して改善", s:"○○を意識することで、間違いが減りました。"}
                ],
                C: [
                    {t:"考えを比べた", s:"○○さんの考えと比べて、自分の考えの違いに気づきました。"},
                    {t:"理由を説明できた", s:"○○になる理由を、自分の言葉で説明できました。"},
                    {t:"考えが深まった", s:"友だちの意見を聞いて、自分の考えが深まりました。"},
                    {t:"より良い方法", s:"○○の方が、○○という理由で分かりやすいと思いました。"},
                    {t:"新しい視点", s:"友だちの考えから、新しい見方に気づきました。"}
                ]
            }
        }
    };

    let currentMode = 'low';
    let currentSubject = ''; 
    let finalText = "";
    
    let balance = {A:0, B:0, C:0};
    let currentCat = null;

    // 音声入力用の変数
    let recognition = null;
    let isRecording = false;

    function setMode(mode) {
        currentMode = mode;
        const h = document.getElementById('header');
        const btns = document.querySelectorAll('.mode-btn');
        if(mode === 'high') {
            h.classList.add('high-mode');
            btns[1].classList.add('active'); btns[0].classList.remove('active');
        } else {
            h.classList.remove('high-mode');
            btns[0].classList.add('active'); btns[1].classList.remove('active');
        }
        document.getElementById('title').innerText = data[mode].title;
        document.getElementById('label-step0').innerText = data[mode].steps[0];
        document.getElementById('label-step1').innerText = data[mode].steps[1];
        document.getElementById('label-step2').innerText = data[mode].steps[2];
        document.getElementById('cat-a').innerText = data[mode].cats[0];
        document.getElementById('cat-b').innerText = data[mode].cats[1];
        document.getElementById('cat-c').innerText = data[mode].cats[2];
        document.getElementById('template-list').innerHTML = "";
        analyzeText(""); 
    }

    function selectSubject(btn, subject) {
        currentSubject = subject;
        const btns = document.querySelectorAll('#subject-grid .cat-btn');
        btns.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        updatePreview();
    }

    function renderTemplates(cat) {
        currentCat = cat;
        const list = document.getElementById('template-list');
        list.innerHTML = "";
        data[currentMode].templates[cat].forEach(item => {
            const b = document.createElement('button');
            b.className = "template-btn";
            b.innerText = item.t;
            b.onclick = () => { document.getElementById('editor').value = item.s; };
            list.appendChild(b);
        });
    }

    function updateBalance(){
        document.getElementById("bal-A").innerText = balance.A;
        document.getElementById("bal-B").innerText = balance.B;
        document.getElementById("bal-C").innerText = balance.C;
    }

    function updatePreview() {
        let display = "";
        if (currentSubject) display += `【${currentSubject}】\n`;
        
        if (finalText) {
            display += `🧠 わかる：${balance.A}　🛠 できる：${balance.B}　💬 かかわる：${balance.C}\n\n`;
            display += finalText;
        } else {
            display = "【ここに文章がつながります】";
        }
        
        document.getElementById('preview').innerText = display;
    }

    function appendDraft() {
        const txt = document.getElementById('editor').value;
        if(!txt) return;
        
        finalText += txt + "\n";
        
        if(currentCat){
            balance[currentCat]++;
            updateBalance();
        }
        
        document.getElementById('editor').value = "";
        updatePreview();
        analyzeText(finalText);
    }

    function analyzeText(text) {
        const advice = document.getElementById('advice-area');
        const msg = document.getElementById('advice-text');
        advice.style.display = "flex";
        
        let feedback = "";
        
        if (text.includes("○○")) {
            feedback = "「○○」の部分を自分の言葉に書きかえてみてね！";
        } 
        else if (balance.A === 0 && balance.B === 0 && balance.C === 0) {
            feedback = "🧠 まずは「A わかる」のボタンを押して、今日わかったことを書いてみよう！";
        } else if (balance.A > 0 && balance.B === 0 && balance.C === 0) {
            feedback = "🛠 いい調子！次は「B できる」のボタンを押して、できるようになったことを書いてみよう！";
        } else if ((balance.A > 0 || balance.B > 0) && balance.C === 0) {
            feedback = "💬 最後に「C かかわる」の視点も入れると、さらに素晴らしい振り返りになるよ！";
        } else if (balance.A === 0 || balance.B === 0) {
            feedback = "💡 「わかる」と「できる」の両方が書けると、もっと学びが深まるよ！";
        } else {
            feedback = "🌟 3つの視点がすべて入った、完璧な振り返りです！素晴らしい！完了ボタンを押そう！";
        }
        
        msg.innerText = feedback;
    }

    // 音声入力のトグル機能
    function toggleVoice() {
        const btn = document.getElementById('voice-btn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) { 
            alert("このブラウザは音声入力に対応していません。（ChromeかSafariを使ってね）"); 
            return; 
        }

        // 録音中なら停止する
        if (isRecording) {
            recognition.stop();
            return;
        }

        // 録音開始
        recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        
        // 録音がスタートした時の見た目の変化
        recognition.onstart = () => {
            isRecording = true;
            btn.innerHTML = "🔴 入力中... (おすとおわる)";
            btn.classList.add('recording');
        };

        // 声が文字になった時の処理
        recognition.onresult = (e) => { 
            document.getElementById('editor').value += e.results[0][0].transcript; 
        };

        // 録音が終わった時（ボタンで止めた時、または黙って自動で止まった時）
        recognition.onend = () => {
            isRecording = false;
            btn.innerHTML = "🎤 こえで入力";
            btn.classList.remove('recording');
        };

        try {
            recognition.start();
        } catch(err) {
            console.error(err);
        }
    }

    function finalize() {
        let copyText = "";
        if (currentSubject) copyText += `【${currentSubject}】\n`;
        
        if (finalText) {
            copyText += `🧠 わかる：${balance.A}　🛠 できる：${balance.B}　💬 かかわる：${balance.C}\n\n`;
            copyText += finalText;
        }

        if(!finalText.trim()) {
            alert("文章がありません。書いてから完了を押してね。");
            return;
        }

        navigator.clipboard.writeText(copyText);
        alert("文章をコピーしました！提出箱にはりつけてね。");
        saveHistory(copyText);
        
        finalText = "";
        currentSubject = "";
        balance = {A:0, B:0, C:0}; 
        currentCat = null;
        updateBalance(); 
        
        document.querySelectorAll('#subject-grid .cat-btn').forEach(b => b.classList.remove('selected'));
        updatePreview();
        analyzeText(""); 
    }

    function saveHistory(text) {
        let history = JSON.parse(localStorage.getItem('f_history') || "[]");
        history.unshift({d: new Date().toLocaleDateString(), t: text});
        history = history.slice(0, 3);
        localStorage.setItem('f_history', JSON.stringify(history));
        loadHistory();
    }

    function loadHistory() {
        const history = JSON.parse(localStorage.getItem('f_history') || "[]");
        const box = document.getElementById('history-list');
        box.innerHTML = history.map(h => `<div class="history-item" onclick="alert('${h.t}')">📅 ${h.d}: ${h.t.substring(0,25)}...</div>`).join('');
    }

    window.onload = () => { 
        setMode('low'); 
        loadHistory(); 
        analyzeText(""); 
    };
</script>

</body>
</html>
